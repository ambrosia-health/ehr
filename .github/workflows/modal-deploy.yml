name: Modal deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Makefile"
      - ".github/workflows/modal-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - modal_environment: main
            github_environment: production
          - modal_environment: staging
            github_environment: staging
    concurrency:
      group: modal-${{ matrix.modal_environment }}
      cancel-in-progress: false
    environment: ${{ matrix.github_environment }}
    env:
      MODAL_ENVIRONMENT: ${{ matrix.modal_environment }}
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      NEON_DATABASE_URL_DIRECT: ${{ secrets.NEON_DATABASE_URL_DIRECT }}
      MODAL_API_HEALTH_URL: ${{ secrets.MODAL_API_HEALTH_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify frozen migration baseline
        run: sha256sum --check .github/frozen-migrations.sha256

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.29"
          enable-cache: true

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$MODAL_TOKEN_ID"
          test -n "$MODAL_TOKEN_SECRET"
          test -n "$NEON_DATABASE_URL_DIRECT"
          test -n "$MODAL_API_HEALTH_URL"
          test -n "$OPENAI_API_KEY"

      - name: Install and verify backend
        run: |
          make backend-install
          make backend-check test-backend

      - name: Apply Neon migrations
        run: DATABASE_URL="$NEON_DATABASE_URL_DIRECT" make migrate

      - name: Attest OpenAI model contract
        run: .venv/bin/ambrosia-ai-attest

      - name: Deploy Modal app
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_SHA:0:12}"
          .venv/bin/modal secret create ambrosia-openai \
            --env "$MODAL_ENVIRONMENT" \
            --force \
            "OPENAI_API_KEY=$OPENAI_API_KEY"
          .venv/bin/modal deploy -m backend.modal_app --env "$MODAL_ENVIRONMENT" --tag "$tag"

      - name: Smoke Modal API
        shell: bash
        run: |
          set -euo pipefail
          test -n "$MODAL_API_HEALTH_URL"
          curl --fail --silent --show-error --retry 10 --retry-all-errors --max-time 20 \
            "$MODAL_API_HEALTH_URL" | \
            python -c 'import json, sys; data=json.load(sys.stdin); assert data.get("status")=="healthy" and data.get("database")=="healthy" and data.get("ai")=="openai_configured", data'
