services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ambrosia}
      POSTGRES_USER: ${POSTGRES_USER:-ambrosia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ambrosia-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ambrosia_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  ambrosia_postgres:
